<style>

        }

            50% { opacity: .7; filter: drop-shadow(0 0 20px rgba(244, 67, 54, 0.8)); }
        }
        .shatter-overlay {
            background-image: radial-gradient(circle at center, transparent 0%, rgba(10, 10, 26, 0.9) 100%);
        }
        /* Broken Heart SVG inline since we need precise control */
        .broken-heart-svg { width: 24px; height: 24px; fill: #484554; }

    body {

<body class="bg-background-deep text-text-primary font-body-lg min-h-screen flex flex-col items-center justify-center relative overflow-hidden antialiased">
<!-- Atmospheric Background Layers -->
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-error/10 via-background-deep to-background-deep opacity-60"></div>
<div class="absolute inset-0 z-0 shatter-overlay pointer-events-none"></div>

<main class="relative z-10 w-full max-w-md px-margin-mobile flex flex-col items-center justify-center flex-grow py-section-padding gap-8">

<div class="text-center space-y-2 mt-12">
<h1 class="font-headline-lg text-headline-lg text-error pulse-red flex items-center justify-center gap-2 drop-shadow-md">

</h1>
<p class="font-body-md text-body-md text-on-surface-variant">شکست مقدمه پیروزی است.</p>
</div>
<!-- Heart Track (Health Status) -->
<div class="w-full bg-surface-card rounded-xl p-4 border border-outline-variant/30 flex flex-col items-center gap-4 shadow-[0_0_15px_rgba(244,67,54,0.1)]">
<div class="font-label-caps text-label-caps text-outline uppercase tracking-widest">وضعیت جان</div>
<div class="flex items-center justify-center gap-1 flex-wrap">
<!-- 9 Active Hearts -->
<span class="material-symbols-outlined text-rarity-rare drop-shadow-[0_0_5px_rgba(244,67,54,0.5)]" style="font-variation-settings: 'FILL' 1;">favorite</span>

<span class="material-symbols-outlined text-rarity-rare drop-shadow-[0_0_5px_rgba(244,67,54,0.5)]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined text-rarity-rare drop-shadow-[0_0_5px_rgba(244,67,54,0.5)]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined text-rarity-rare drop-shadow-[0_0_5px_rgba(244,67,54,0.5)]" style="font-variation-settings: 'FILL' 1;">favorite</span>

</div>
<div class="font-stat-numeric text-stat-numeric text-on-surface">9 / 10</div>
</div>
