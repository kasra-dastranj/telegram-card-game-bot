<!DOCTYPE html>

<html class="dark" dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>نتیجه باخت - TelBattle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&amp;family=Rajdhani:wght@600;700&amp;family=Vazirmatn:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#690005",
                        "on-secondary-fixed": "#251a00",
                        "rarity-normal": "#4CAF50",
                        "surface-variant": "#31324f",
                        "surface": "#0f102c",
                        "surface-container-high": "#262744",
                        "secondary": "#f0c040",
                        "on-primary-container": "#ffffff",
                        "secondary-fixed": "#ffdf97",
                        "surface-bright": "#363654",
                        "on-tertiary": "#492900",
                        "text-primary": "#FFFFFF",
                        "inverse-surface": "#e1e0ff",
                        "rarity-epic": "#9C27B0",
                        "on-surface-variant": "#cac4d6",
                        "inverse-on-surface": "#2d2e4b",
                        "on-surface": "#e1e0ff",
                        "inverse-primary": "#6343d0",
                        "on-error-container": "#ffdad6",
                        "surface-card": "#12122A",
                        "primary": "#cbbeff",
                        "secondary-container": "#b88d00",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-primary-fixed-variant": "#4a25b7",
                        "on-background": "#e1e0ff",
                        "tertiary": "#ffb86e",
                        "surface-container-low": "#181934",
                        "on-primary-fixed": "#1d0061",
                        "on-secondary": "#3e2e00",
                        "rarity-legend": "#FF9800",
                        "outline-variant": "#484554",
                        "outline": "#938ea0",
                        "surface-container": "#1c1d39",
                        "on-primary": "#330098",
                        "on-secondary-fixed-variant": "#5a4400",
                        "tertiary-container": "#ac6600",
                        "on-secondary-container": "#392a00",
                        "surface-container-highest": "#31324f",
                        "surface-container-lowest": "#0a0b26",
                        "rarity-rare": "#F44336",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb86e",
                        "background": "#0f102c",
                        "secondary-fixed-dim": "#f0c040",
                        "on-tertiary-fixed": "#2c1600",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#ffdcbd",
                        "surface-tint": "#cbbeff",
                        "primary-fixed": "#e6deff",
                        "primary-container": "#7b5eea",
                        "background-deep": "#0A0A1A",
                        "surface-dim": "#0f102c",
                        "primary-fixed-dim": "#cbbeff",
                        "on-tertiary-container": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-gap": "8px",
                        "section-padding": "24px",
                        "gutter": "12px",
                        "unit": "4px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Oswald"],
                        "button-label": ["Oswald"],
                        "label-caps": ["Rajdhani"],
                        "body-lg": ["Vazirmatn"],
                        "headline-lg": ["Oswald"],
                        "headline-md": ["Oswald"],
                        "body-md": ["Vazirmatn"],
                        "stat-numeric": ["Rajdhani"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "button-label": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600" }],

                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "stat-numeric": ["18px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.95); }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 3s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-deep text-text-primary min-h-screen flex flex-col relative overflow-hidden font-body-md selection:bg-error-container/30">
<!-- Atmospheric Glow Background -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-error-container/10 via-background-deep to-background-deep pointer-events-none z-0"></div>
<!-- Main Content Canvas (Transactional/Result Intent -> Suppress Navigation Shells) -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-safe z-10 w-full max-w-md mx-auto">
<!-- Defeat Hero Section -->
<div class="flex flex-col items-center justify-center mb-8 animate-subtle-pulse">
<span class="material-symbols-outlined text-[100px] text-error drop-shadow-[0_0_30px_rgba(255,180,171,0.4)] mb-2" data-weight="fill">heart_broken</span>
<h1 class="font-headline-lg text-headline-lg text-error-container tracking-wider uppercase text-center">باختی</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center opacity-80">نبرد سختی بود، اما هنوز تمام نشده.</p>
</div>
<!-- Status & Rewards Card (Glassmorphism) -->
<div class="w-full bg-surface-card/80 backdrop-blur-md rounded-xl border border-white/5 p-6 shadow-[0_8px_32px_rgba(0,0,0,0.6)] flex flex-col gap-6 mb-8 relative overflow-hidden">
<!-- Subtle internal glow -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-error-container/5 rounded-full blur-2xl pointer-events-none"></div>
<!-- Heart Meter -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center w-full">
<span class="font-body-md text-body-md text-on-surface">جان باقی‌مانده</span>
<span class="font-stat-numeric text-stat-numeric text-error flex items-center gap-1">
                        7/10
                        <span class="material-symbols-outlined text-[18px] text-error" data-weight="fill">favorite</span>
</span>
</div>
<div class="flex justify-between items-center w-full rtl:flex-row-reverse bg-surface rounded-full p-1 border border-white/5">
<!-- 7 Active Hearts -->
<div class="flex text-error gap-[2px]">
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
</div>
<!-- 1 Breaking Heart -->
<span class="material-symbols-outlined text-[20px] text-error/40 animate-pulse" data-weight="fill">heart_broken</span>
<!-- 2 Empty Hearts -->
<div class="flex text-surface-bright gap-[2px]">
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
<span class="material-symbols-outlined text-[20px]" data-weight="fill">favorite</span>
</div>
</div>
</div>
<!-- Minimal XP Reward -->
<div class="flex flex-col gap-2 pt-4 border-t border-white/5">
<div class="flex justify-between items-center w-full">
<span class="font-body-md text-body-md text-on-surface">امتیاز تجربه کسب شده</span>
<span class="font-stat-numeric text-stat-numeric text-primary-fixed-dim">+3 XP</span>
</div>
<!-- XP Bar -->
<div class="w-full h-2 bg-surface rounded-full overflow-hidden relative border border-white/5">
<div class="absolute top-0 right-0 h-full bg-gradient-to-l from-primary-container to-primary rounded-full transition-all duration-1000 ease-out" style="width: 15%;"></div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3">
<button class="w-full bg-primary-container hover:bg-primary-container/80 text-on-primary-container font-button-label text-button-label py-3 rounded-lg transition-colors active:scale-[0.98] duration-200 flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(123,94,234,0.2)]">
<span class="material-symbols-outlined text-[20px]">refresh</span>
                تلاش دوباره
            </button>
<button class="w-full border border-outline/50 hover:bg-surface-bright/50 text-on-surface-variant font-button-label text-button-label py-3 rounded-lg transition-colors active:scale-[0.98] duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">home</span>
                خانه
            </button>
</div>
</main>
</body></html>
