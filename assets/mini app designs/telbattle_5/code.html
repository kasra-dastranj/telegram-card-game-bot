<style>
        @keyframes fall {
            0% { transform: translateY(-5vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 16px;
            border-radius: 2px;
            animation: fall linear infinite;
        }
        .pulse-glow {
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 10px rgba(240,192,64,0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(240,192,64,1)); }

<script>
        // Simple Confetti Generator
        document.addEventListener('DOMContentLoaded', () => {
            const layer = document.getElementById('confetti-layer');
            const colors = ['#f0c040', '#7b5eea', '#cbbeff', '#FF9800', '#9C27B0'];
            const confettiCount = 60;

            for (let i = 0; i < confettiCount; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti-piece');
                
                // Randomize properties
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = `${Math.random() * 100}vw`;
                
                const duration = Math.random() * 3 + 2; // 2s to 5s
                conf.style.animationDuration = `${duration}s`;
                conf.style.animationDelay = `${Math.random() * 2}s`;
                
                // Random sizes
                const scale = Math.random() * 0.8 + 0.4;
                conf.style.transform = `scale(${scale})`;
                
                layer.appendChild(conf);
            }
        });
    </script>
