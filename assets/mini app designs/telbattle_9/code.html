<style>

            opacity: 0;

<body class="font-body-md h-screen w-full flex flex-col justify-between items-center relative">

</div>
<!-- Rewards Glassmorphism Card -->

<!-- Inner Glow Highlight -->
<div class="absolute -inset-1 bg-gradient-to-r from-secondary-fixed-dim/0 via-secondary-fixed-dim/20 to-secondary-fixed-dim/0 rounded-xl blur opacity-0 group-hover:opacity-100 transition duration-1000 group-hover:duration-200 pointer-events-none"></div>

<div class="space-y-4">
<!-- XP Reward -->

<!-- Confetti Script -->
<script>
        const colors = ['#f0c040', '#7b5eea', '#cbbeff', '#ffffff', '#FF9800'];
        const container = document.getElementById('confetti-container');

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            
            // Random properties
            const left = Math.random() * 100;
            const animationDuration = Math.random() * 3 + 2;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const width = Math.random() * 8 + 4;
            
            confetti.style.left = `${left}vw`;
            confetti.style.backgroundColor = color;
            confetti.style.width = `${width}px`;
            confetti.style.height = `${width * (Math.random() > 0.5 ? 2 : 1)}px`;
            confetti.style.animationDuration = `${animationDuration}s`;
            
            if(Math.random() > 0.5) {
                confetti.style.borderRadius = '50%';
            }

            container.appendChild(confetti);

            setTimeout(() => {
                confetti.remove();
            }, animationDuration * 1000);
        }

        // Generate initial burst
        for(let i=0; i<50; i++) {
            setTimeout(createConfetti, Math.random() * 1000);
        }

        // Continue generating at a slower rate
        setInterval(createConfetti, 100);
    </script>
