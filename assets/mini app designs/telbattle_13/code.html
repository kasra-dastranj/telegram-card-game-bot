<script>
        // Simple Confetti Generator
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#f0c040', '#7b5eea', '#ffffff'];
            
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                
                // Randomize properties
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 2) + 's';
                conf.style.animationName = 'fall';
                conf.style.animationIterationCount = 'infinite';
                conf.style.animationTimingFunction = 'linear';
                
                // Random shapes
                if(Math.random() > 0.5) conf.style.borderRadius = '50%';
                
                container.appendChild(conf);
            }
        }
        
        // Init confetti
        createConfetti();
    </script>
