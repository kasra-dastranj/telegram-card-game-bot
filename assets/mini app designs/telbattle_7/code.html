<style>

        }

        }

        .glow-defeat {
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.4);
        }

        /* Simple Confetti Animation */
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .confetti {
            position: fixed;
            width: 8px;
            height: 16px;
            background-color: theme('colors.secondary');
            animation: confetti-fall 3s linear infinite;
            z-index: 10;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        }

<script>
        // Simple Confetti Generator for Victory State
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = ''; // Clear existing
            
            const colors = ['#f0c040', '#7b5eea', '#9C27B0', '#ffffff'];
            
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                
                // Randomize properties
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 2) + 's';
                
                container.appendChild(conf);
            }
        }

        // State Toggler Logic
        function toggleState(state) {
            const victorySection = document.getElementById('victory-state');
            const defeatSection = document.getElementById('defeat-state');
            const victoryGlow = document.getElementById('victory-bg-glow');
            const defeatGlow = document.getElementById('defeat-bg-glow');
            const confettiContainer = document.getElementById('confetti-container');
            const xpBar = document.getElementById('xp-bar-fill');

            if (state === 'victory') {
                victorySection.classList.remove('hidden');
                defeatSection.classList.add('hidden');
                victoryGlow.classList.remove('opacity-0');
                defeatGlow.classList.add('opacity-0');
                createConfetti();
                confettiContainer.style.display = 'block';
                
                // Animate XP Bar
                setTimeout(() => {
                    if(xpBar) xpBar.style.width = '25%';
                }, 100);

            } else {
                victorySection.classList.add('hidden');
                defeatSection.classList.remove('hidden');
                victoryGlow.classList.add('opacity-0');
                defeatGlow.classList.remove('opacity-0');
                confettiContainer.style.display = 'none';
                
                if(xpBar) xpBar.style.width = '0%';
            }
        }

        // Initialize with Victory
        toggleState('victory');
    </script>
